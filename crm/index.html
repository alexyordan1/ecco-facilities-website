<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="manifest" href="/crm/manifest.json">
  <meta name="theme-color" content="#0B1D38">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Dashboard — CRM — Ecco Facilities</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/crm.css?v=4.1">
</head>
<body>
  <div id="app" class="crm-shell">
    <div class="crm-main">
      <div class="crm-topbar">
        <div class="crm-breadcrumb"><span>Dashboard</span></div>
        <button id="sidebarToggle" class="crm-sidebar-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      </div>
      <div class="crm-content">
        <div class="crm-date-range" id="dateRange">
          <button class="crm-date-pill" data-range="7">7d</button>
          <button class="crm-date-pill" data-range="30">30d</button>
          <button class="crm-date-pill" data-range="month">This Month</button>
          <button class="crm-date-pill" data-range="lastmonth">Last Month</button>
          <button class="crm-date-pill active" data-range="all">All</button>
        </div>
        <div id="dashboardKpis" class="crm-stats-grid"></div>
        <div id="dashboardCharts" class="crm-charts-grid"></div>
      </div>
    </div>
  </div>
  <script src="/js/chart.min.js"></script>
  <script src="/js/crm-core.js?v=4.1"></script>
  <script src="/js/crm-dashboard.js?v=4.2"></script>
  <script src="/js/crm-ai.js?v=4.1"></script>
</body>
</html>
