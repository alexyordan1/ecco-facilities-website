<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Pipeline — CRM — Ecco Facilities</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/crm.css?v=3.6">
</head>
<body>
  <div id="app" class="crm-shell">
    <div class="crm-main">
      <div class="crm-topbar">
        <div class="crm-breadcrumb"><span>Pipeline</span></div>
        <button id="sidebarToggle" class="crm-sidebar-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      </div>
      <div class="crm-content">
        <div class="crm-kanban-toolbar">
          <select id="filterService" class="crm-filter-select">
            <option value="">All Services</option>
            <option value="janitorial">Janitorial</option>
            <option value="dayporter">Day Porter</option>
          </select>
          <div id="kanbanSummary" class="crm-kanban-summary"></div>
        </div>
        <div id="kanbanBoard" class="crm-kanban"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="/js/crm-core.js?v=3.6"></script>
  <script src="/js/crm-pipeline.js?v=3.6"></script>
  <script src="/js/crm-ai.js?v=3.6"></script>
</body>
</html>
