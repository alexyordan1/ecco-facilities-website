<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Reset Password — CRM — Ecco Facilities</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/crm.css?v=2.1">
</head>
<body>
  <div class="crm-login-page">
    <div class="crm-login-card">
      <h1 class="crm-login-title">Reset Password</h1>
      <p class="crm-login-subtitle">Enter your new password</p>
      <div id="resetError" class="crm-login-error" role="alert"></div>
      <div id="resetForm">
        <div class="crm-form-group">
          <label for="newPassword" class="crm-label">New Password</label>
          <input type="password" id="newPassword" class="crm-input" placeholder="Enter new password" required autocomplete="new-password">
        </div>
        <div class="crm-form-group">
          <label for="confirmPassword" class="crm-label">Confirm Password</label>
          <input type="password" id="confirmPassword" class="crm-input" placeholder="Confirm new password" required autocomplete="new-password">
        </div>
        <button type="button" id="resetBtn" class="crm-btn crm-btn-full">Update Password</button>
      </div>
      <a href="/crm/login" class="crm-login-back">&larr; Back to login</a>
    </div>
  </div>
  <script>
  (function() {
    var errorEl = document.getElementById('resetError');
    var resetBtn = document.getElementById('resetBtn');
    var newPw = document.getElementById('newPassword');
    var confirmPw = document.getElementById('confirmPassword');

    // Extract access_token from URL hash
    var hash = window.location.hash.substring(1);
    var params = new URLSearchParams(hash);
    var accessToken = params.get('access_token');

    if (!accessToken) {
      errorEl.textContent = 'Invalid or expired reset link. Please request a new one.';
      errorEl.classList.add('visible');
      document.getElementById('resetForm').style.display = 'none';
      return;
    }

    resetBtn.addEventListener('click', async function() {
      var pw = newPw.value;
      var confirm = confirmPw.value;

      if (pw.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.classList.add('visible');
        return;
      }
      if (pw !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.add('visible');
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = 'Updating...';
      errorEl.classList.remove('visible');

      try {
        var res = await fetch('https://aijgpluromciwgrbvhjq.supabase.co/auth/v1/user', {
          method: 'PUT',
          headers: {
            'Authorization': 'Bearer ' + accessToken,
            'apikey': accessToken,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password: pw })
        });

        if (res.ok) {
          document.getElementById('resetForm').innerHTML = '<div class="crm-forgot-success"><p>Password updated! Redirecting to login...</p></div>';
          setTimeout(function() { window.location.href = '/crm/login'; }, 2000);
        } else {
          errorEl.textContent = 'Failed to update password. The link may have expired.';
          errorEl.classList.add('visible');
        }
      } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.classList.add('visible');
      } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
      }
    });
  })();
  </script>
</body>
</html>
